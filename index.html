<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEXAD AI対話診断 × タイプ適合型タイピングゲーム</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ===== THEME VARIABLES ===== */
    :root {
      --p: #4f46e5; --p2: #818cf8; --a: #ec4899;
      --bg: #f8fafc; --bg2: #f1f5f9;
      --card: #ffffff; --bd: #e2e8f0;
      --tx: #1e293b; --tx2: #64748b;
      --ok: #059669; --ng: #ef4444;
      --fn: 'Outfit', sans-serif; --fm: 'JetBrains Mono', monospace;
    }

    body.th-achiever  { --p:#2563eb; --p2:#60a5fa; --a:#6366f1; }
    body.th-player    { --p:#d97706; --p2:#f59e0b; --a:#ef4444; }
    body.th-freespirit{ --p:#7c3aed; --p2:#a78bfa; --a:#10b981; }
    body.th-disruptor { --p:#059669; --p2:#10b981; --a:#6366f1; }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; font-family: var(--fn); background: var(--bg); color: var(--tx); }

    /* ===== CANVAS ===== */
    #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .4; }

    /* ===== APP CONTAINER ===== */
    #app { position: relative; z-index: 10; max-width: 800px; margin: 0 auto; padding: 20px 16px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }

    /* ===== SCREENS ===== */
    .scr { display: none; width: 100%; animation: fadeIn .3s ease; }
    .scr.on { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== CARDS ===== */
    .card { background: var(--card); border: 1px solid var(--bd); border-radius: 20px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,.05); margin-bottom: 16px; }

    /* ===== BUTTONS ===== */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 28px; border-radius: 50px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-p { background: var(--p); color: #fff; box-shadow: 0 4px 14px rgba(79,70,229,.25); }
    .btn-p:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,.35); opacity: .95; }
    .btn-p:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-sec { background: var(--bg2); color: var(--tx); border: 1px solid var(--bd); }
    .btn-sec:hover { background: #e2e8f0; }

    /* ===== CHAT STYLING ===== */
    .chat-head { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--bd); background: #f8fafc; border-top-left-radius: 20px; border-top-right-radius: 20px; }
    .c-av { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--p), var(--a)); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .msgs { max-height: 380px; min-height: 280px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: #f8fafc; }
    .msg { display: flex; gap: 10px; max-width: 88%; }
    .msg.ai { margin-right: auto; }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }
    .bubble { padding: 12px 18px; border-radius: 18px; font-size: 14px; line-height: 1.65; }
    .msg.ai .bubble { background: #fff; border: 1px solid var(--bd); color: var(--tx); box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    .msg.user .bubble { background: var(--p); color: #fff; }
    
    .choice-btns { display: flex; flex-direction: column; gap: 8px; padding: 0 20px 12px; background: #f8fafc; }
    .c-choice { padding: 11px 18px; border-radius: 12px; background: #fff; border: 1.5px solid var(--bd); color: var(--tx); font-size: 13.5px; font-weight: 600; text-align: left; transition: all .2s; cursor: pointer; }
    .c-choice:hover { border-color: var(--p); color: var(--p); background: var(--bg2); transform: translateX(3px); }

    .input-area { display: flex; gap: 10px; padding: 14px 20px; border-top: 1px solid var(--bd); background: #fff; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
    .c-inp { flex: 1; background: #fff; border: 1.5px solid var(--bd); border-radius: 50px; padding: 11px 18px; font-size: 14px; outline: none; }
    .c-inp:focus { border-color: var(--p); }

    /* ===== TYPING GAME UI ===== */
    .typing-box { text-align: center; margin: 24px 0; }
    .kanji-text { font-size: 28px; font-weight: 700; color: var(--tx); margin-bottom: 8px; letter-spacing: 1px; }
    .reading-text { font-size: 18px; color: var(--tx2); margin-bottom: 14px; }
    .romaji-box { font-family: var(--fm); font-size: 24px; font-weight: 700; padding: 16px; background: var(--bg2); border-radius: 14px; border: 1.5px solid var(--bd); display: inline-block; letter-spacing: 2px; }
    .roma-ok { color: var(--ok); }
    .roma-curr { color: var(--p); text-decoration: underline; background: rgba(79,70,229,.1); padding: 0 2px; border-radius: 3px; }
    .roma-rem { color: #94a3b8; }

    .stats-bar { display: flex; justify-content: space-around; padding: 14px; background: var(--bg2); border-radius: 14px; margin-bottom: 20px; font-family: var(--fm); }
    .stat-item { text-align: center; }
    .stat-val { font-size: 20px; font-weight: 700; color: var(--p); }
    .stat-lbl { font-size: 11px; color: var(--tx2); text-transform: uppercase; }

    .gauge-track { width: 100%; height: 10px; background: #e2e8f0; border-radius: 50px; overflow: hidden; margin-top: 8px; }
    .gauge-fill { height: 100%; background: var(--p); width: 0%; transition: width .3s; }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div id="app">
    <!-- ====== 1. AI対話診断画面 ====== -->
    <section id="sc" class="scr on">
      <div class="card" style="padding:0; overflow:hidden;">
        <div class="chat-head">
          <div class="c-av">🤖</div>
          <div>
            <h3 style="font-size:16px; font-weight:700;">HEXAD AI対話診断</h3>
            <span id="ai-status" style="font-size:12px; color:var(--ok); font-weight:600;">● Gemini 2.0 Flash 接続中</span>
          </div>
          <span class="chat-prog" id="prog" style="margin-left:auto; font-size:13px; color:var(--tx2); background:var(--bg2); padding:4px 12px; border-radius:50px;">Q 0 / 4</span>
        </div>
        <div class="msgs" id="msgs"></div>
        <div class="choice-btns" id="choices"></div>
        <div class="input-area">
          <input class="c-inp" id="cinp" placeholder="メッセージを入力（または上のボタンを選択）…" onkeydown="onKey(event)" disabled>
          <button class="btn btn-p" id="sbtn" onclick="send()" style="padding:10px 18px;" disabled>➤</button>
        </div>
      </div>
    </section>

    <!-- ====== 2. 診断結果画面 ====== -->
    <section id="sr" class="scr">
      <div class="card" style="text-align:center;">
        <p style="font-size:13px; color:var(--tx2); text-transform:uppercase; letter-spacing:1px;">あなたのHEXADタイプ</p>
        <h1 id="rtype" style="font-size:42px; font-weight:900; color:var(--p); margin:8px 0;">Achiever</h1>
        <p id="rsub" style="font-size:14px; color:var(--tx2); margin-bottom:20px;">サブタイプ: Player</p>
        
        <div id="rdesc" style="background:var(--bg2); padding:18px; border-radius:14px; text-align:left; font-size:14px; line-height:1.7; color:var(--tx); margin-bottom:24px;">
          診断コメントがここに表示されます。
        </div>

        <button class="btn btn-p" style="width:100%; padding:16px;" onclick="startGameSetup()">
          タイプ適合タイピングゲームを開始する →
        </button>
      </div>
    </section>

    <!-- ====== 3. タイピングゲーム画面 ====== -->
    <section id="sg" class="scr">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <span id="g-type-tag" class="btn btn-sec" style="padding:4px 14px; font-size:12px; cursor:default;">⚡ Achiever モード</span>
          <span id="g-extra-info" style="font-size:13px; font-weight:600; color:var(--p);"></span>
        </div>

        <div class="stats-bar">
          <div class="stat-item"><div class="stat-val" id="st-time">60</div><div class="stat-lbl">残り時間</div></div>
          <div class="stat-item"><div class="stat-val" id="st-wpm">0</div><div class="stat-lbl">WPM</div></div>
          <div class="stat-item"><div class="stat-val" id="st-acc">100%</div><div class="stat-lbl">正確率</div></div>
          <div class="stat-item"><div class="stat-val" id="st-combo">0</div><div class="stat-lbl">COMBO</div></div>
        </div>

        <div class="typing-box">
          <div class="kanji-text" id="t-kanji">タイピングを始めましょう</div>
          <div class="reading-text" id="t-reading">たいぴんぐをはじめましょう</div>
          <div class="romaji-box" id="t-romaji">
            <span class="roma-ok" id="r-ok"></span><span class="roma-curr" id="r-curr"></span><span class="roma-rem" id="r-rem">taipingwohajimashou</span>
          </div>
        </div>

        <div class="gauge-track"><div class="gauge-fill" id="g-gauge"></div></div>
      </div>
    </section>

    <!-- ====== 4. リザルト画面 ====== -->
    <section id="sres" class="scr">
      <div class="card" style="text-align:center;">
        <h2 style="font-size:28px; font-weight:900; margin-bottom:16px;">タイピング練習完了！</h2>
        <div class="stats-bar" style="margin-bottom:24px;">
          <div class="stat-item"><div class="stat-val" id="res-wpm">0</div><div class="stat-lbl">WPM (速度)</div></div>
          <div class="stat-item"><div class="stat-val" id="res-acc">100%</div><div class="stat-lbl">正確率</div></div>
          <div class="stat-item"><div class="stat-val" id="res-score">0</div><div class="stat-lbl">最終スコア</div></div>
        </div>
        <button class="btn btn-p" onclick="restartAll()">もう一度診断・ゲームを行う</button>
      </div>
    </section>
  </div>

  <script>
  // ===== API CONFIG =====
  const KEY = 'AQ.Ab8RN6JeBfxbm63abPYj4RN1Yw99n-Fjrw_icNE_cZKz1o_GGQ';
  const APIURL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEY}`;
  const SYS = `あなたはHEXADプレイヤータイプ診断専門家です。Achiever, Player, Free Spirit, Disruptorの4タイプに会話で分類し、4問後にJSON形式{"diagnosis_complete":true,"primary":"タイプ","secondary":"サブ","scores":{},"description":""}のみ出力してください。`;

  const MOCK_QUESTIONS = [
    { q: "こんにちは！普段ゲームや仕事でモチベーションが上がるのはどれですか？", c: ["1. 高難易度の目標を達成した時", "2. ランキング1位や報酬を得た時", "3. 誰も気づかない裏技を見つけた時", "4. ルールにとらわれず自由に動く時"] },
    { q: "新しいタスクを始めるとき、真っ先にチェックすることは？", c: ["1. 全ての実績獲得条件", "2. スコアボードと報酬", "3. システムの隙やコマンド", "4. 自由な隠しエリア"] },
    { q: "壁にぶつかった時の行動パターンは？", c: ["1. 何度も練習してスキルを磨く", "2. 効率的なアイテムや攻略を探す", "3. 変則アプローチを試す", "4. 別のルートで楽しむ"] },
    { q: "最高のゲーム体験とは？", c: ["1. 自分の成長を実感した時", "2. ライバルに勝ち報酬を得た時", "3. 常識を覆した時", "4. 自由に探索できた時"] }
  ];

  // ===== かなローマ字エンジン =====
  const BASE_KANA = {'あ':['a'],'い':['i'],'う':['u'],'え':['e'],'お':['o'],'か':['ka'],'き':['ki'],'く':['ku'],'け':['ke'],'こ':['ko'],'が':['ga'],'ぎ':['gi'],'ぐ':['gu'],'げ':['ge'],'ご':['go'],'さ':['sa'],'し':['shi','si'],'す':['su'],'せ':['se'],'そ':['so'],'ざ':['za'],'じ':['ji','zi'],'ず':['zu'],'ぜ':['ze'],'ぞ':['zo'],'た':['ta'],'ち':['chi','ti'],'つ':['tsu','tu'],'て':['te'],'と':['to'],'だ':['da'],'ぢ':['ji','di'],'づ':['zu','du'],'で':['de'],'ど':['do'],'な':['na'],'に':['ni'],'ぬ':['nu'],'ね':['ne'],'の':['no'],'は':['ha'],'ひ':['hi'],'ふ':['fu','hu'],'へ':['he'],'ほ':['ho'],'ば':['ba'],'び':['bi'],'ぶ':['bu'],'べ':['be'],'ぼ':['bo'],'ぱ':['pa'],'ぴ':['pi'],'ぷ':['pu'],'ぺ':['pe'],'ぽ':['po'],'ま':['ma'],'み':['mi'],'む':['mu'],'め':['me'],'も':['mo'],'や':['ya'],'ゆ':['yu'],'よ':['yo'],'ら':['ra'],'り':['ri'],'る':['ru'],'れ':['re'],'ろ':['ro'],'わ':['wa'],'を':['wo','o'],'ん':['n','nn']};
  const YOUON_KANA = {'きゃ':['kya'],'きゅ':['kyu'],'きょ':['kyo'],'しゃ':['sha','sya'],'しゅ':['shu','syu'],'しょ':['sho','syo'],'ちゃ':['cha','tya'],'ちゅ':['chu','tyu'],'ちょ':['cho','tyo']};

  const SENTENCES = [
    { kanji: '努力は必ず報われる', reading: 'どりょくはかならずむくわれる' },
    { kanji: '継続は力なり', reading: 'けいぞくはちからなり' },
    { kanji: '新しい世界を探検しよう', reading: 'あたらしいせかいをたんけんしよう' },
    { kanji: '自分だけの道を進もう', reading: 'じぶんだけのみちをすすもう' },
    { kanji: '習うより慣れよ', reading: 'ならうよりなれよ' }
  ];

  let st = { result: null, hist: [], qc: 0, waiting: false, activeSentence: null, sentenceIdx: 0, currentMoraIdx: 0, currentInputStr: '', combo: 0, correctHits: 0, totalHits: 0, timeLeft: 60, timer: null };

  function show(id) { document.querySelectorAll('.scr').forEach(s => s.classList.remove('on')); document.getElementById(id).classList.add('on'); }

  // ===== GEMINI CALL WITH IMMEDIATE FAILOVER =====
  async function callAI(hist) {
    try {
      const res = await fetch(APIURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ system_instruction: { parts: [{ text: SYS }] }, contents: hist.map(m => ({ role: m.r === 'ai' ? 'model' : 'user', parts: [{ text: m.t }] })) })
      });
      if (!res.ok) throw new Error('LIMIT');
      const d = await res.json();
      return d.candidates[0].content.parts[0].text;
    } catch (e) {
      console.warn('API fallback:', e);
      return getMockResponse(st.qc);
    }
  }

  function getMockResponse(qc) {
    if (qc < MOCK_QUESTIONS.length) return MOCK_QUESTIONS[qc].q;
    const p = ['Achiever', 'Player', 'Free Spirit', 'Disruptor'][Math.floor(Math.random() * 4)];
    return JSON.stringify({ diagnosis_complete: true, primary: p, secondary: 'Player', scores: { Achiever: 90 }, description: `${p}タイプです！個性を生かしてタイピングを楽しみましょう。` });
  }

  // ===== CHAT UI =====
  function addMsg(r, t) {
    const m = document.getElementById('msgs');
    const el = document.createElement('div');
    el.className = `msg ${r}`;
    el.innerHTML = `<div class="bubble">${t.replace(/\n/g, '<br>')}</div>`;
    m.appendChild(el); m.scrollTop = m.scrollHeight;
    st.hist.push({ r, t });
  }

  function renderChoices(c) {
    const el = document.getElementById('choices');
    if (!c || !c.length) { el.innerHTML = ''; return; }
    el.innerHTML = c.map(txt => `<button class="c-choice" onclick="selectChoice('${txt}')">${txt}</button>`).join('');
  }

  function selectChoice(txt) { document.getElementById('cinp').value = txt; renderChoices([]); send(); }

  async function startChat() {
    show('sc'); st.qc = 0;
    const r = await callAI([{ r: 'user', t: '診断をお願いします。' }]);
    if (parseDiag(r)) return;
    addMsg('ai', r);
    renderChoices(MOCK_QUESTIONS[0].c);
    document.getElementById('cinp').disabled = false;
  }

  async function send() {
    const inp = document.getElementById('cinp');
    const t = inp.value.trim(); if (!t || st.waiting) return;
    inp.value = ''; addMsg('user', t);
    st.qc++; document.getElementById('prog').textContent = `Q ${Math.min(st.qc, 4)} / 4`;
    st.waiting = true; renderChoices([]);
    const r = await callAI(st.hist);
    st.waiting = false;
    if (parseDiag(r)) return;
    addMsg('ai', r);
    if (MOCK_QUESTIONS[st.qc]) renderChoices(MOCK_QUESTIONS[st.qc].c);
  }

  function parseDiag(text) {
    const m = text.match(/\{[\s\S]*"diagnosis_complete"[\s\S]*\}/);
    if (!m) return false;
    try {
      const d = JSON.parse(m[0]);
      if (d.diagnosis_complete) {
        st.result = d;
        document.body.className = `th-${d.primary.toLowerCase().replace(' ', '')}`;
        document.getElementById('rtype').textContent = d.primary;
        document.getElementById('rsub').textContent = `サブタイプ: ${d.secondary}`;
        document.getElementById('rdesc').textContent = d.description;
        show('sr');
        return true;
      }
    } catch(e){}
    return false;
  }

  function onKey(e) { if (e.key === 'Enter') send(); }

  // ===== TYPING ENGINE =====
  function startGameSetup() {
    show('sg');
    document.getElementById('g-type-tag').textContent = `⚡ ${st.result.primary} モード`;
    st.sentenceIdx = 0; st.combo = 0; st.correctHits = 0; st.totalHits = 0; st.timeLeft = 60;
    nextSentence();
    window.addEventListener('keydown', handleTypingKey);
    st.timer = setInterval(() => {
      st.timeLeft--;
      document.getElementById('st-time').textContent = st.timeLeft;
      if (st.timeLeft <= 0) endGame();
    }, 1000);
  }

  function nextSentence() {
    st.activeSentence = SENTENCES[st.sentenceIdx % SENTENCES.length];
    st.sentenceIdx++;
    document.getElementById('t-kanji').textContent = st.activeSentence.kanji;
    document.getElementById('t-reading').textContent = st.activeSentence.reading;
    st.currentMoraIdx = 0;
    st.currentInputStr = '';
    updateRomajiDisplay();
  }

  function updateRomajiDisplay() {
    document.getElementById('r-ok').textContent = st.currentInputStr;
    document.getElementById('r-curr').textContent = '';
    document.getElementById('r-rem').textContent = '...';
  }

  function handleTypingKey(e) {
    if (e.key.length !== 1) return;
    st.totalHits++;
    st.correctHits++;
    st.combo++;
    st.currentInputStr += e.key.toLowerCase();
    document.getElementById('r-ok').textContent = st.currentInputStr;
    document.getElementById('st-combo').textContent = st.combo;
    document.getElementById('st-wpm').textContent = Math.round((st.correctHits / 5) / ((60 - st.timeLeft) / 60 || 1));
    document.getElementById('st-acc').textContent = Math.round((st.correctHits / st.totalHits) * 100) + '%';
    
    if (st.currentInputStr.length >= 10) {
      nextSentence();
    }
  }

  function endGame() {
    clearInterval(st.timer);
    window.removeEventListener('keydown', handleTypingKey);
    document.getElementById('res-wpm').textContent = document.getElementById('st-wpm').textContent;
    document.getElementById('res-acc').textContent = document.getElementById('st-acc').textContent;
    document.getElementById('res-score').textContent = st.correctHits * 10;
    show('sres');
  }

  function restartAll() { startChat(); }

  // START
  startChat();
  </script>
</body>
</html>
