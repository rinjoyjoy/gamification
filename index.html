<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Procrastination Task Gravity</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Matter.js (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #f8fafc 0%, #e2e8f0 100%);
            font-family: 'Inter', sans-serif;
            touch-action: none; /* スマホでの意図しないスクロールを防止 */
        }
        .task-card {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: center center;
            /* 背景部分はマウスイベントを透過させ、裏側の物理エンジンキャンバスにドラッグ判定を任せる */
            pointer-events: none;
            user-select: none;
            border-radius: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            will-change: transform;
            backdrop-filter: blur(4px);
        }
        /* カード内のテキストやボタンはクリック可能にする */
        .task-card > * {
            pointer-events: auto;
        }
    </style>
</head>
<body class="h-screen w-screen relative">

    <!-- 1. タスク登録フォーム（上部固定） -->
    <div class="absolute top-0 left-0 w-full p-6 flex justify-center z-50 pointer-events-none">
        <!-- 物理操作への干渉を防ぐため、UI領域ではイベント伝播をストップ -->
        <div class="bg-white/85 backdrop-blur-md p-6 rounded-2xl shadow-xl w-full max-w-md pointer-events-auto border border-white/40"
             onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <h1 class="text-2xl font-bold text-slate-800 mb-4 text-center tracking-tight">Task Gravity</h1>
            <form id="task-form" class="flex flex-col gap-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">タスク名</label>
                    <input type="text" id="task-name" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white transition-shadow outline-none" placeholder="例: 面倒なレポートを執筆する">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">気が進まない度 (1: 軽い 〜 5: 重圧)</label>
                    <input type="range" id="task-burden" min="1" max="5" value="3" class="w-full accent-indigo-500 cursor-pointer">
                    <div class="flex justify-between text-xs font-medium text-slate-400 mt-1 px-1">
                        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:shadow-lg transition-all transform active:scale-95">
                    タスクを投下する
                </button>
            </form>
        </div>
    </div>

    <!-- 2. 無重力（Anti-Gravity）ボタン -->
    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-50 pointer-events-auto"
         onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
        <button id="antigravity-btn" class="bg-gradient-to-r from-violet-500 to-fuchsia-500 hover:from-violet-600 hover:to-fuchsia-600 text-white font-bold py-4 px-10 rounded-full shadow-xl shadow-fuchsia-500/30 transform transition-all hover:scale-105 active:scale-95 text-lg tracking-wide border border-white/20">
            ✨ 無重力モード ✨
        </button>
    </div>

    <!-- 3. 実験データDLボタン（右下・半透明で配置） -->
    <div class="absolute bottom-4 right-4 z-50 pointer-events-auto opacity-30 hover:opacity-100 transition-opacity"
         onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
        <button id="download-logs-btn" class="bg-slate-800 text-white text-xs font-semibold py-2 px-4 rounded-lg shadow cursor-pointer hover:bg-slate-700">
            実験データ DL (JSON)
        </button>
    </div>

    <!-- 物理エンジン & アプリケーションロジック -->
    <script>
        // ========= 実験用ロギングシステム =========
        const LOG_KEY = 'task_experiment_logs';
        let experimentLogs = JSON.parse(localStorage.getItem(LOG_KEY)) || [];

        function logEvent(action, details = {}) {
            const event = {
                timestamp: new Date().toISOString(),
                action,
                ...details
            };
            experimentLogs.push(event);
            localStorage.setItem(LOG_KEY, JSON.stringify(experimentLogs));
            console.log("Logged:", event);
        }

        logEvent('session_start');

        // ========= Matter.js 物理エンジンのセットアップ =========
        const Engine = Matter.Engine,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              World = Matter.World,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint,
              Events = Matter.Events;

        const engine = Engine.create();
        const world = engine.world;
        const tasksMap = new Map(); // 物理BodyとDOM要素のマッピング

        // 画面の境界（壁・床・天井）を作成
        let floor, leftWall, rightWall, ceiling;
        function createBoundaries() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const thick = 60;
            
            if (floor) {
                World.remove(world, [floor, leftWall, rightWall, ceiling]);
            }
            
            floor = Bodies.rectangle(w / 2, h + thick / 2, w, thick, { isStatic: true });
            leftWall = Bodies.rectangle(-thick / 2, h / 2, thick, h, { isStatic: true });
            rightWall = Bodies.rectangle(w + thick / 2, h / 2, thick, h, { isStatic: true });
            ceiling = Bodies.rectangle(w / 2, -thick / 2, w, thick, { isStatic: true });
            
            World.add(world, [floor, leftWall, rightWall, ceiling]);
        }
        createBoundaries();
        window.addEventListener('resize', createBoundaries);

        // マウス・タッチ操作の制約（ドラッグ可能にする）
        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        World.add(world, mouseConstraint);

        // ドラッグイベントのロギング
        Events.on(mouseConstraint, 'startdrag', function(event) {
            if (event.body && event.body.plugin && event.body.plugin.taskId) {
                logEvent('task_dragged', { taskId: event.body.plugin.taskId });
            }
        });

        // エンジンを起動
        const runner = Runner.create();
        Runner.run(runner, engine);

        // ========= DOM要素との同期ループ =========
        Events.on(engine, 'afterUpdate', function() {
            tasksMap.forEach((el, body) => {
                // Matter.jsの座標と角度をDOM要素のCSS Transformに反映
                el.style.transform = `translate(${body.position.x - el.offsetWidth / 2}px, ${body.position.y - el.offsetHeight / 2}px) rotate(${body.angle}rad)`;
            });
        });

        // ========= タスク追加ロジック =========
        document.getElementById('task-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const nameInput = document.getElementById('task-name');
            const burdenInput = document.getElementById('task-burden');
            
            const name = nameInput.value.trim();
            const burden = parseInt(burdenInput.value);
            if (!name) return;
            
            const taskId = 'task_' + Date.now();
            
            // 負担度に応じたサイズと重さの計算
            const width = 120 + (burden * 30);
            const height = 50 + (burden * 15);
            
            // 負担度に応じたスタイルの分岐 (1: 軽い 〜 5: 重圧)
            const colors = [
                'bg-emerald-100 border-2 border-emerald-300 text-emerald-800 shadow-sm', // 1
                'bg-lime-100 border-2 border-lime-300 text-lime-800 shadow-sm', // 2
                'bg-amber-100 border-2 border-amber-300 text-amber-800 shadow-md', // 3
                'bg-orange-100 border-2 border-orange-400 text-orange-900 shadow-lg', // 4
                'bg-rose-100 border-4 border-rose-500 text-rose-900 shadow-xl shadow-rose-400/40'  // 5 (最大)
            ];
            const colorClass = colors[burden - 1];
            
            // 落下位置（画面中央上部）
            const x = window.innerWidth / 2 + (Math.random() * 60 - 30);
            const y = 200; 
            
            // Matter.js オブジェクト（剛体）の生成
            const body = Bodies.rectangle(x, y, width, height, {
                restitution: 0.7, // 弾力性（バウンドしやすさ）
                friction: 0.1,
                frictionAir: 0.02, // 空気抵抗
                density: 0.001 + (burden * 0.001), // 負担度が高いほど質量が大きくなる
                plugin: { taskId, created: Date.now(), burden }
            });
            
            World.add(world, body);
            
            // HTML要素の生成
            const el = document.createElement('div');
            el.className = `task-card ${colorClass}`;
            el.style.width = width + 'px';
            el.style.height = height + 'px';
            
            // ドラッグ操作への干渉を防ぐため、ボタンの onmousedown で伝播を止める
            el.innerHTML = `
                <div class="text-center w-full px-2 overflow-hidden font-bold leading-tight ${burden >= 4 ? 'text-lg' : 'text-sm'}">
                    ${name}
                </div>
                <div class="text-xs font-semibold opacity-70 mt-1">負担度: ${burden}</div>
                <button class="mt-2 bg-white/90 text-gray-800 text-xs font-bold py-1.5 px-4 rounded shadow hover:bg-gray-100 hover:scale-105 active:scale-95 transition-all" 
                        onmousedown="event.stopPropagation()" 
                        ontouchstart="event.stopPropagation()" 
                        onclick="completeTask('${taskId}', event)">
                    完了する
                </button>
            `;
            
            document.body.appendChild(el);
            tasksMap.set(body, el);
            
            logEvent('task_created', { taskId, name, burden });
            
            // 入力リセット
            nameInput.value = '';
            burdenInput.value = '3';
        });

        // ========= タスク完了（消去）ロジック =========
        window.completeTask = function(taskId, event) {
            event.stopPropagation();
            
            let targetBody = null;
            for (let [body, el] of tasksMap.entries()) {
                if (body.plugin.taskId === taskId) {
                    targetBody = body;
                    break;
                }
            }
            
            if (targetBody) {
                const el = tasksMap.get(targetBody);
                
                // 消滅時のフワッとしたアニメーション
                el.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                el.style.transform += ' scale(1.3)';
                el.style.opacity = '0';
                
                setTimeout(() => {
                    World.remove(world, targetBody);
                    el.remove();
                    tasksMap.delete(targetBody);
                }, 300);
                
                const leadTimeMs = Date.now() - targetBody.plugin.created;
                logEvent('task_completed', { taskId, leadTimeMs });
            }
        };

        // ========= 無重力モード（Anti-Gravity） =========
        let isAntiGravity = false;
        document.getElementById('antigravity-btn').addEventListener('click', function() {
            isAntiGravity = !isAntiGravity;
            
            if (isAntiGravity) {
                engine.world.gravity.y = 0; // 重力ゼロ
                this.innerHTML = '🌍 重力を元に戻す';
                this.classList.replace('from-violet-500', 'from-blue-500');
                this.classList.replace('to-fuchsia-500', 'to-cyan-500');
                
                // 切り替え時にすべてのタスクに上向きの力とランダムな回転を加える
                for (let body of tasksMap.keys()) {
                    Matter.Body.applyForce(body, body.position, {
                        x: (Math.random() - 0.5) * 0.05 * body.mass,
                        y: -0.05 * body.mass
                    });
                    Matter.Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.2);
                }
            } else {
                engine.world.gravity.y = 1; // 通常重力
                this.innerHTML = '✨ 無重力モード ✨';
                this.classList.replace('from-blue-500', 'from-violet-500');
                this.classList.replace('to-cyan-500', 'to-fuchsia-500');
            }
            
            logEvent('antigravity_toggled', { isAntiGravity });
        });

        // 無重力中にオブジェクトが止まらないよう、常に微小な力をランダムに加え続ける
        Events.on(engine, 'beforeUpdate', function() {
            if (isAntiGravity) {
                for (let body of tasksMap.keys()) {
                    if (Math.random() < 0.03) { 
                        Matter.Body.applyForce(body, body.position, {
                            x: (Math.random() - 0.5) * 0.002 * body.mass,
                            y: (Math.random() - 0.5) * 0.002 * body.mass
                        });
                    }
                }
            }
        });

        // ========= 実験データダウンロード =========
        document.getElementById('download-logs-btn').addEventListener('click', function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(experimentLogs, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `experiment_logs_${Date.now()}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            
            logEvent('logs_downloaded');
        });
    </script>
</body>
</html>
