<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイプ適応型タイピングゲーム（研究用プロトタイプ）</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ============ 0. ようこそ / 設定画面 ============ -->
  <section id="screen-welcome" class="screen active">
    <div class="card">
      <h1>タイプ適応型 タイピングゲーム</h1>
      <p class="lead">AI対話会話（Gemini 2.0 Flash）でゲーミフィケーション嗜好タイプ（HEXADモデル）を判定し、あなたのタイプに合わせた要素でタイピング練習を行う研究用プロトタイプです。</p>

      <div class="field">
        <label for="input-nickname">ニックネーム（ランキング表示用・任意）</label>
        <input type="text" id="input-nickname" placeholder="例：たろう" maxlength="20">
      </div>

      <div class="button-row">
        <button id="btn-start-survey-llm" class="btn btn-primary">🤖 Gemini AI対話でタイプ判定して始める</button>
        <button id="btn-start-survey-rule" class="btn btn-secondary">🤖 簡易対話で始める</button>
      </div>
      <p class="hint small">※研究にご協力いただく場合は、担当者の案内に従ってください。</p>
    </div>
  </section>

  <!-- ============ 1. AI対話診断画面 ============ -->
  <section id="screen-chat" class="screen">
    <div class="card" style="padding: 0; overflow: hidden; border-radius: var(--radius);">
      <div class="chat-head">
        <div class="c-av">🤖</div>
        <div>
          <h3 style="margin:0; font-size:1rem; font-weight:700;">HEXAD AI対話診断</h3>
          <span id="ai-status" style="font-size:0.8rem; color:var(--good); font-weight:600;">● Gemini 2.0 Flash 接続中</span>
        </div>
        <span id="chat-prog" style="margin-left:auto; font-size:0.85rem; color:var(--text-secondary); background:var(--gridline); padding:4px 12px; border-radius:50px; font-weight:600;">Q 0 / 4</span>
      </div>
      <div class="msgs" id="msgs"></div>
      <div class="choice-btns" id="choices"></div>
      <div class="input-area">
        <input class="c-inp" id="cinp" placeholder="メッセージを入力（または上のボタンを選択）…" onkeydown="onKey(event)" disabled>
        <button class="btn btn-primary" id="sbtn" onclick="sendMsg()" style="padding:8px 18px;" disabled>➤</button>
      </div>
    </div>
  </section>

  <!-- ============ 3. 判定結果 ============ -->
  <section id="screen-result" class="screen">
    <div class="card">
      <h2>あなたのゲーミフィケーションタイプ</h2>
      <div id="result-badge" class="type-badge"></div>
      <p id="result-rationale" class="lead"></p>

      <div id="result-chart" class="bar-chart" role="img" aria-label="6タイプのスコア"></div>
      <p id="result-fallback-note" class="hint" style="display:none;"></p>

      <div class="button-row">
        <button id="btn-goto-setup" class="btn btn-primary">タイピング練習へ進む</button>
      </div>
    </div>
  </section>

  <!-- ============ 4. ゲーム設定（タイプ別） ============ -->
  <section id="screen-setup" class="screen">
    <div class="card" id="setup-card">
      <h2 id="setup-title">練習の準備</h2>
      <p id="setup-type-desc" class="lead"></p>

      <div class="setup-row">
        <h3>制限時間</h3>
        <div id="setup-time-limit"></div>
      </div>

      <div class="setup-row">
        <h3>文章の長さ</h3>
        <div id="setup-difficulty"></div>
      </div>

      <div id="setup-type-body"></div>

      <div class="button-row">
        <button id="btn-start-game" class="btn btn-primary">スタート</button>
      </div>
    </div>
  </section>

  <!-- ============ 5. タイピング画面 ============ -->
  <section id="screen-game" class="screen">
    <div class="card">
      <div id="game-hud" class="game-hud"></div>

      <div id="game-sentence" class="game-sentence">
        <div id="game-kanji" class="game-kanji"></div>
        <div id="game-reading" class="game-reading"></div>
        <div id="game-romaji" class="game-romaji"></div>
      </div>

      <div id="game-side-panel" class="game-side-panel"></div>

      <div class="button-row">
        <button id="btn-end-session" class="btn btn-tertiary">終了して結果を見る</button>
      </div>
    </div>
  </section>

  <!-- ============ 6. ゲーム結果 ============ -->
  <section id="screen-postgame" class="screen">
    <div class="card">
      <h2>結果</h2>
      <div id="postgame-stats" class="stats-grid"></div>
      <div id="postgame-gamification" class="gamification-box"></div>

      <div class="button-row">
        <button id="btn-play-again" class="btn btn-primary">もう一度プレイ</button>
        <button id="btn-back-setup" class="btn btn-secondary">設定に戻る</button>
      </div>

      <details class="export-details">
        <summary>研究データのエクスポート</summary>
        <p class="hint">この端末に保存されたセッション記録（<span id="log-count">0</span>件）を書き出します。</p>
        <div class="button-row">
          <button id="btn-export-json" class="btn btn-tertiary">JSONで書き出す</button>
          <button id="btn-export-csv" class="btn btn-tertiary">CSVで書き出す</button>
          <button id="btn-clear-log" class="btn btn-danger">記録を削除</button>
        </div>
      </details>
    </div>
  </section>

</div>
<script src="survey-data.js"></script>
<script src="script.js"></script>
</body>
</html>
